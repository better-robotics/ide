name: Release dist

# Tag ide-vN to cut a release with the full built site (source + vendored
# Monaco/mqtt.js) as one tarball — hub/pi's install.sh and customize-image.sh
# fetch it to serve at /ide/. Same tag-gated shape as hub's own
# release-mcpb.yml / build-image.yml (pi-image-vN). A plain git-archive
# tarball of this repo won't do: vendor/ is gitignored (fetched, not
# committed — see vendor.sh), so the release asset is the only artifact that
# carries the full static site.

on:
  push:
    tags: ['ide-v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./vendor.sh
      # Tarball must land outside the tree it's archiving — tar aborts
      # ("file changed as we read it") if the output file is a sibling of
      # the inputs and gets created mid-read.
      - run: tar -czf /tmp/ide-dist.tar.gz --exclude=.git --exclude=.github --exclude=dist-esp32 .
      # The ESP32-hub bundle: same app minus Monaco (editor-lite.js ships as
      # editor.js) — small enough to embed in a 4 MB-flash hub's firmware.
      - run: ./build-esp32.sh && tar -czf /tmp/ide-esp32-dist.tar.gz -C dist-esp32 .
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME:-manual-$(git rev-parse --short HEAD)}"
          gh release create "$tag" --repo "${{ github.repository }}" \
            --title "$tag" --generate-notes /tmp/ide-dist.tar.gz /tmp/ide-esp32-dist.tar.gz \
            || gh release upload "$tag" /tmp/ide-dist.tar.gz /tmp/ide-esp32-dist.tar.gz --repo "${{ github.repository }}" --clobber
