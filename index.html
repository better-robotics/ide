<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ide — sprocket-robotics</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- data: favicon = no favicon.ico request — a console 404 on every hub-served load otherwise -->
<link rel="icon" href="data:,">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>ide</h1>
    <!-- No team/password. Every hub admits every client with no auth at all
         (hub CONTRACT.md § Discovery & isolation: anonymous carries rw on
         robots/**, and the rover firmware sends no credentials either). Only
         `instructor` needs a password, and only to write fleet/estop — which
         this app never touches. These fields asked for something the hub
         stopped wanting on 2026-07-13. -->
    <form id="conn-form" class="conn">
      <input id="host-input" placeholder="hub host (e.g. hub.local)" aria-label="Hub host" autocomplete="off">
      <button id="connect-btn" type="submit">Connect</button>
      <span id="status-chip" class="chip" role="status" aria-live="polite">disconnected</span>
    </form>
  </header>
  <main>
    <section id="editor-pane">
      <!-- Boot cover. The vendor bundles are the last thing in <body>, so this
           pane paints as an empty box while Blockly and Monaco land — furniture
           with a hole in it reads as broken, not loading. The mark fills in as
           each view becomes usable: S when blocks can render, R when the code
           editor is mounted.

           The letterforms are inlined rather than fetched from icon.svg: covering
           a gap must not itself cost a request, and this file may never grow a
           same-origin absolute URL (shell.html rebases it onto Pages). Inlining
           means a second copy of the geometry, so the boot-mark svg below is
           GENERATED — sprocket-robotics.github.io/tools/gen-icon.py owns it and
           `--check` fails if it drifts. Edit the mark there, never here. -->
      <div id="boot">
        <svg id="boot-mark" viewBox="0 0 256 256" aria-hidden="true">
          <g transform="translate(48.536 174.080) scale(0.063867 -0.063867)"><path class="boot-ltr s" d="M644.6666666666666 -24.933333333333334Q474.2 -24.933333333333334 347.3 25.199999999999996Q220.4 75.33333333333333 147.63333333333333 169.76666666666665Q74.86666666666666 264.2 66.33333333333333 396.06666666666666L65.33333333333333 412.4H343.3333333333333L345.3333333333333 400.73333333333335Q355.4 344.1333333333333 396.4 302.6Q437.4 261.06666666666666 503.1333333333333 238.16666666666666Q568.8666666666667 215.26666666666665 652.3333333333334 215.26666666666665Q737.6666666666666 215.26666666666665 799.4333333333334 238.46666666666667Q861.2 261.6666666666667 895.0 304.0666666666667Q928.8 346.4666666666667 928.8 402.73333333333335V403.73333333333335Q928.8 478.2 870.7333333333333 520.7333333333333Q812.6666666666666 563.2666666666667 677.2 591.1333333333333L524.2 621.9333333333333Q382.26666666666665 650.6 287.0333333333333 705.2666666666667Q191.8 759.9333333333333 144.0 841.4666666666667Q96.2 923 96.2 1031.2666666666667V1032.2666666666667Q96.73333333333333 1163.4 167.1 1261.1333333333332Q237.46666666666667 1358.8666666666666 361.06666666666666 1413.4Q484.6666666666667 1467.9333333333334 643.4 1467.9333333333334Q808.6666666666666 1467.9333333333334 929.4666666666667 1415.8000000000002Q1050.2666666666667 1363.6666666666667 1118.4 1269.2333333333333Q1186.5333333333333 1174.8 1193.6 1048.8666666666666L1194.6 1030.6H916.6L915.0666666666667 1042.7333333333333Q907.3333333333334 1100.8666666666666 871.5666666666666 1141.9Q835.8 1182.9333333333334 777.5 1205.3333333333335Q719.2 1227.7333333333333 643.0666666666667 1227.7333333333333Q564.8 1227.7333333333333 507.96666666666664 1205.0333333333333Q451.1333333333333 1182.3333333333333 420.73333333333335 1142.2333333333333Q390.3333333333333 1102.1333333333334 390.3333333333333 1049.4V1048.4Q390.3333333333333 1002 416.1 967.5Q441.8666666666667 933 495.6333333333333 908.7333333333333Q549.4 884.4666666666667 633.1333333333333 867.2L786.1333333333333 836.4Q937.4 806.2666666666667 1033.8666666666666 753.2666666666667Q1130.3333333333333 700.2666666666667 1176.6333333333332 619.9Q1222.9333333333334 539.5333333333333 1222.9333333333334 426.26666666666665V425.26666666666665Q1222.9333333333334 287.4666666666667 1153.7666666666667 186.23333333333335Q1084.6 85 955.0666666666666 30.03333333333333Q825.5333333333333 -24.933333333333334 644.6666666666666 -24.933333333333334Z"/></g>
          <g transform="translate(125.522 174.080) scale(0.063867 -0.063867)"><path class="boot-ltr r" d="M126.66666666666667 0V1443H704Q858.6666666666666 1443 970.1666666666667 1388.3333333333335Q1081.6666666666667 1333.6666666666667 1141.6666666666667 1232.6666666666667Q1201.6666666666667 1131.6666666666667 1201.6666666666667 991.6666666666666V989.6666666666666Q1201.6666666666667 844.6666666666666 1128.8333333333335 734.3333333333333Q1056 624 931 578.3333333333334L1245 0H946.3333333333334L664.3333333333334 538.6666666666666Q661 538.6666666666666 657.6666666666667 538.6666666666666Q654.3333333333334 538.6666666666666 650.6666666666666 538.6666666666666H388V0ZM388 744.3333333333334H677Q798.3333333333334 744.3333333333334 866.0 808.6666666666667Q933.6666666666666 873 933.6666666666666 988V990Q933.6666666666666 1102.3333333333333 863.0 1167.1666666666665Q792.3333333333334 1232 671.6666666666666 1232H388Z"/></g>
        </svg>
        <p id="boot-msg" role="status" aria-live="polite">Loading the editor…</p>
      </div>
      <div class="pane-bar">
        <button id="mode-blocks" type="button" aria-pressed="false">Blocks</button>
        <button id="mode-code" type="button" aria-pressed="false">Python</button>
      </div>
      <div id="blockly" hidden></div>
      <div id="preview-label" hidden>the Python your blocks make — press Python to write it by hand</div>
      <div id="editor"></div>
      <button id="run-btn" type="button">Run</button>
    </section>
    <aside id="side-pane">
      <h2>Console</h2>
      <div id="console" role="log" aria-live="polite"></div>
      <h2>Telemetry</h2>
      <pre id="telemetry"></pre>
    </aside>
  </main>
  <!-- Blockly's UMD wrappers take the AMD branch if window.define exists —
       and Monaco's AMD loader defines exactly that. These must stay parser
       scripts ahead of app.js (a module, so it runs after them), which is
       what keeps Monaco's loader from existing yet. Order within the four is
       also fixed: core → blocks → generator → messages. -->
  <script src="vendor/blockly/blockly_compressed.js"></script>
  <script src="vendor/blockly/blocks_compressed.js"></script>
  <script src="vendor/blockly/python_compressed.js"></script>
  <script src="vendor/blockly/msg/en.js"></script>
  <!-- Blockly is parsed: the blocks view can render, so the S lights. This has to
       be a classic script HERE rather than a line in app.js — app.js is a module,
       so it runs after every script above, and by then this milestone has
       silently passed. -->
  <script>
    (function () {
      var s = document.querySelector(".boot-ltr.s");
      if (!s) return;
      s.classList.add("lit");
      var msg = document.getElementById("boot-msg");
      msg.textContent = "Blocks ready. Loading the code editor…";

      // Failsafe: the cover must never outlive what it waits on. editor.js's
      // loadMonaco() binds only script.onload, so if the loader 404s its promise
      // never settles, `await mountEditor` hangs, and app.js never gets to lift
      // this. Blocks already work at that point — trapping a usable view behind a
      // cover would be worse than the empty pane this replaces.
      setTimeout(function () {
        var b = document.getElementById("boot");
        if (!b) return;
        msg.textContent = "The code editor didn’t load — blocks still work.";
        b.classList.add("done");
        setTimeout(function () { b.remove(); }, 400);
      }, 12000);
    })();
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
